<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #007bff; margin-top: 0; text-align: center; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .task { background: #252525; padding: 15px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #007bff; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 8px; }
        .btn-status { cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #333; color: #888; border: none; }
        .btn-status.active { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Planner by Lolcat</h2>
    <input type="text" id="taskInput" placeholder="Enter video idea..." onkeypress="if(event.key==='Enter') addTask()">
    <div id="taskList"></div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('myVideos')) || [];

    function addTask() {
        let input = document.getElementById('taskInput');
        if(input.value.trim() !== "") {
            tasks.push({text: input.value, status: [false, false, false]});
            localStorage.setItem('myVideos', JSON.stringify(tasks));
            input.value = '';
            render();
        }
    }

    function toggle(tIdx, sIdx) {
        tasks[tIdx].status[sIdx] = !tasks[tIdx].status[sIdx];
        localStorage.setItem('myVideos', JSON.stringify(tasks));
        render();
    }

    function render() {
        let list = document.getElementById('taskList');
        list.innerHTML = tasks.map((t, i) => `
            <div class="task">
                <span>${t.text}</span>
                <div class="controls">
                    <button class="btn-status ${t.status[0] ? 'active' : ''}" onclick="toggle(${i},0)">Recorded</button>
                    <button class="btn-status ${t.status[1] ? 'active' : ''}" onclick="toggle(${i},1)">Edited</button>
                    <button class="btn-status ${t.status[2] ? 'active' : ''}" onclick="toggle(${i},2)">Thumbnail</button>
                </div>
            </div>
        `).join('');
    }
    render();
</script>
</body>
</html>
