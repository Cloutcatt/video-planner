<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 400px; }
        input { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 20px; }
        .task-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
        .check { width: 20px; height: 20px; border: 2px solid #555; border-radius: 50%; }
        .check.done { background: #007bff; border-color: #007bff; }
        /* Modal */
        #modal { display: none; position: fixed; top: 100px; background: #252525; padding: 20px; border-radius: 10px; border: 1px solid #444; width: 350px; }
        textarea { width: 100%; height: 100px; background: #121212; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Planner</h2>
    <input type="text" id="taskInput" placeholder="New idea..." onkeypress="if(event.key==='Enter') addTask()">
    <div id="taskList"></div>
</div>

<div id="modal">
    <h3 id="mTitle">Notes</h3>
    <textarea id="mArea" oninput="saveNote()"></textarea>
    <button onclick="document.getElementById('modal').style.display='none'">Close</button>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('myVideos')) || [];
    let curIdx = 0;

    function addTask() {
        let val = document.getElementById('taskInput').value;
        if(!val) return;
        tasks.push({text: val, done: false, note: ""});
        localStorage.setItem('myVideos', JSON.stringify(tasks));
        document.getElementById('taskInput').value = '';
        render();
    }

    function toggle(i) {
        tasks[i].done = !tasks[i].done;
        localStorage.setItem('myVideos', JSON.stringify(tasks));
        render();
    }

    function openNote(i) {
        curIdx = i;
        document.getElementById('mTitle').innerText = tasks[i].text;
        document.getElementById('mArea').value = tasks[i].note;
        document.getElementById('modal').style.display = 'block';
    }

    function saveNote() {
        tasks[curIdx].note = document.getElementById('mArea').value;
        localStorage.setItem('myVideos', JSON.stringify(tasks));
    }

    function render() {
        document.getElementById('taskList').innerHTML = tasks.map((t, i) => `
            <div class="task-row">
                <div class="check ${t.done ? 'done' : ''}" onclick="toggle(${i})"></div>
                <span onclick="openNote(${i})">${t.text}</span>
            </div>
        `).join('');
    }
    render();
</script>
</body>
</html>
